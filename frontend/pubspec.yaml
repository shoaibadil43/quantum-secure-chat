name: quantum_secure_chat
description: A cross-platform quantum-secure chat application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Framework
  material_color_gen: ^2.0.0
  animate_do: ^3.2.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Networking & WebSocket
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.1+1
  
  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  local_auth: ^2.1.0
  
  # Encryption
  cryptography: ^2.7.0
  crypto: ^3.0.3
  
  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0
  
  # Date/Time
  intl: ^0.19.0
  
  # Image & Media
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  
  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  url_launcher: ^6.2.0
  
  # Logging
  logger: ^2.0.0
  
  # Testing
  mockito: ^5.4.0
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  