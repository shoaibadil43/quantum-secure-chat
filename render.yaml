services:
  - type: web
    name: quantum-secure-chat-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./test.db
      - key: REDIS_URL
        value: redis://localhost:6379
    rootDir: backend
